name: Build and Release Extension

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0, v2.1.3, etc.

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Extension
        # WXT build creates the .output directory
        run: npx wxt build 

      - name: Zip the build
        # WXT outputs to .output/<browser> by default
        # Adjust 'chrome-mv3' if your config differs
        run: |
          cd .output/chrome-mv3
          zip -r ../../extension-release.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension-release.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
